<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Envoyer des photos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
</head>

<body class="modern-body">
  <main class="page-shell">
    <section class="card app-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="app-title h3 text-center mb-3">Envoyer des photos</h1>
        <p class="app-subtitle text-center mb-4">Sélectionnez vos images puis validez l'envoi.</p>
        <form action="/upload?partyname=myParty" method="POST" enctype="multipart/form-data">
          <div class="mb-4">
            <label for="photos" class="form-label">Photos</label>
            <input type="file" id="photos" class="form-control" name="photos" accept="image/*" multiple required>
            <div class="form-text">Formats image uniquement. Sélection multiple autorisée.</div>
          </div>
          <button type="submit" class="btn btn-danger w-100">Envoyer</button>
        </form>
      </div>
    </section>
  </main>
</body>

</html>
