<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eventslide : Password change</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
</head>

<body class="modern-body">
  <main class="page-shell">
    <section class="card app-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="app-title h3 text-center mb-4">Changer mon mot de passe</h1>
        <form action="/passwordChange" method="POST">
          <div class="mb-3 text-start">
            <label for="password" class="form-label">Mot de passe courant</label>
            <input type="password" id="password" class="form-control" name="password" required>
          </div>
          <div class="mb-3 text-start">
            <label for="newPwd" class="form-label">Nouveau mot de passe</label>
            <input type="password" id="newPwd" class="form-control" name="newPassword" required>
          </div>
          <div class="mb-4 text-start">
            <label for="newPwd2" class="form-label">Confirmer le nouveau mot de passe</label>
            <input type="password" id="newPwd2" class="form-control" name="newPassword2" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Changer de mot de passe</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const passwordChange = urlParams.get('passwordChange');

    if (passwordChange === 'true') {
      const message = document.createElement('p');
      message.className = 'status-message error text-center';
      message.textContent = "Le changement de mot de passe a échoué.";
      document.querySelector('.card-body').appendChild(message);
    } else if (passwordChange === 'false') {
      const message = document.createElement('p');
      message.className = "status-message success text-center";
      message.textContent = "Mot de passe changé.";
      document.querySelector('.card-body').appendChild(message);
    }
  </script>
</body>

</html>
