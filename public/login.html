<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Eventslide : Authentification</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="/app.css">
</head>

<body class="modern-body">
  <main class="page-shell">
    <section class="card app-card">
      <div class="card-body p-4 p-md-5">
        <h1 class="app-title h3 text-center mb-4">Authentification</h1>
        <form action="/login" method="POST">
          <div class="mb-3 text-start">
            <label for="username" class="form-label">Nom d'utilisateur</label>
            <input type="text" id="username" class="form-control" name="username" required>
          </div>
          <div class="mb-4 text-start">
            <label for="password" class="form-label">Mot de passe</label>
            <input type="password" id="password" class="form-control" name="password" required>
          </div>
          <button type="submit" class="btn btn-primary w-100">Se connecter</button>
        </form>
      </div>
    </section>
  </main>
  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const authenticationFailed = urlParams.get('authenticationfailed');

    if (authenticationFailed === 'true') {
      const message = document.createElement('p');
      message.className = 'status-message error text-center';
      message.textContent = "L'authentification a échoué. Veuillez vérifier votre nom d'utilisateur et votre mot de passe.";
      document.querySelector('.card-body').appendChild(message);
    }
  </script>
</body>

</html>
